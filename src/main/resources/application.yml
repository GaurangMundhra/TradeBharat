spring:
  application:
    name: finsimx-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/finsimx
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true

  security:
    user:
      name: admin
      password: admin123

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true

logging:
  level:
    root: INFO
    com.finsimx: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# JWT Configuration
jwt:
  secret: your-secret-key-change-this-in-production-with-at-least-32-characters-for-hs256
  expiration: 86400000 # 24 hours in milliseconds

# Trading Engine Configuration
trading:
  simulation:
    enabled: true
    bot-interval-seconds: 5
  market-data:
    update-interval-seconds: 30
